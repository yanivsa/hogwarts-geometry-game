<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="10" fill="gold" />
  <path d="M40 50 Q 10 20 5 50 T 40 50" fill="white" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 40 50" to="20 40 50" dur="0.1s" repeatCount="indefinite" />
  </path>
  <path d="M60 50 Q 90 20 95 50 T 60 50" fill="white" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 60 50" to="-20 60 50" dur="0.1s" repeatCount="indefinite" />
  </path>
</svg>