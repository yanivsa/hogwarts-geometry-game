<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <path d="M10 90 L80 20" stroke="#4b2c20" stroke-width="5" stroke-linecap="round" />
  <path d="M75 25 L85 15" stroke="#6d4c41" stroke-width="6" stroke-linecap="round" />
  <circle cx="85" cy="15" r="3" fill="white">
    <animate attributeName="r" values="3;6;3" dur="1s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="90" cy="10" r="2" fill="cyan" opacity="0.8">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
  </circle>
</svg>